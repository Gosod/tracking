<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>{{ order.order_number }}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');
    :root {
      --bg:#0f0f0f; --surface:#1a1a1a; --border:#2a2a2a;
      --accent:#e8ff47; --text:#e0e0e0; --muted:#666;
      --danger:#ff4f4f; --ok:#4fff91;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; min-height:100vh; padding-bottom:60px; }

    header {
      background:var(--surface); border-bottom:2px solid var(--accent);
      padding:16px 20px; display:flex; align-items:center; gap:14px;
      position:sticky; top:0; z-index:100;
    }
    .back-btn { color:var(--accent); text-decoration:none; font-size:1.2rem; padding:4px; }
    header h1 { font-family:'IBM Plex Mono',monospace; font-size:.95rem; font-weight:600; color:var(--accent); letter-spacing:.06em; flex:1; }
    .progress-bar-wrap { width:80px; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
    .progress-bar-fill { height:100%; background:var(--ok); border-radius:2px; transition:width .4s; }
    .progress-label { font-family:'IBM Plex Mono',monospace; font-size:.7rem; color:var(--muted); white-space:nowrap; }

    .positions { padding:12px 16px; display:flex; flex-direction:column; gap:8px; }

    /* ── Карточка позиции ── */
    .pos-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:6px; overflow:hidden; transition:border-color .2s;
      display:flex; flex-direction:column;
    }
    .pos-card.done { border-color:var(--ok); opacity:.7; }
    .pos-card.done .pos-name { text-decoration:line-through; color:var(--muted); }

    /* Верхняя часть: картинка + инфо */
    .pos-top { display:flex; gap:0; }

    /* Картинка */
    .pos-image {
      width:110px; min-width:110px; height:110px;
      background:var(--border);
      display:flex; align-items:center; justify-content:center;
      overflow:hidden; flex-shrink:0;
      border-right:1px solid var(--border);
    }
    .pos-image img { width:100%; height:100%; object-fit:cover; }
    .pos-image .no-img {
      color:var(--muted); font-size:.65rem; font-family:'IBM Plex Mono',monospace;
      text-align:center; padding:8px; line-height:1.5;
    }

    /* Инфо */
    .pos-body { flex:1; padding:12px 14px 10px; min-width:0; }
    .pos-header { display:flex; align-items:flex-start; gap:8px; margin-bottom:4px; }
    .pos-num { font-family:'IBM Plex Mono',monospace; font-size:.65rem; color:var(--muted); background:var(--border); padding:2px 6px; border-radius:2px; white-space:nowrap; margin-top:2px; flex-shrink:0; }
    .pos-name { font-size:.9rem; font-weight:600; line-height:1.3; }
    .pos-designation { font-family:'IBM Plex Mono',monospace; font-size:.68rem; color:var(--muted); margin-bottom:10px; word-break:break-all; }

    .pos-progress { display:flex; align-items:center; gap:10px; }
    .pos-progress-bar { flex:1; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
    .pos-progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width .4s; }
    .pos-card.done .pos-progress-fill { background:var(--ok); }
    .pos-qty-label { font-family:'IBM Plex Mono',monospace; font-size:.75rem; color:var(--muted); white-space:nowrap; }

    /* Кнопки */
    .pos-actions { display:flex; border-top:1px solid var(--border); }
    .btn-mark { flex:1; background:none; border:none; color:var(--text); font-family:'IBM Plex Sans',sans-serif; font-size:.85rem; font-weight:600; padding:14px 12px; cursor:pointer; transition:background .15s,color .15s; display:flex; align-items:center; justify-content:center; gap:6px; }
    .btn-mark:active { background:rgba(232,255,71,.1); color:var(--accent); }
    .btn-mark.primary { border-right:1px solid var(--border); }
    .btn-mark.done-btn { color:var(--ok); }
    .btn-qty { background:none; border:none; border-left:1px solid var(--border); color:var(--muted); font-size:.8rem; padding:14px 16px; cursor:pointer; font-family:'IBM Plex Mono',monospace; }
    .btn-qty:active { color:var(--accent); background:rgba(232,255,71,.07); }

    /* ── Модалка ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:200; display:none; align-items:flex-end; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:var(--surface); border:1px solid var(--border); border-top:2px solid var(--accent); border-radius:8px 8px 0 0; padding:24px; width:100%; max-width:480px; }
    .modal h2 { font-family:'IBM Plex Mono',monospace; font-size:.85rem; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.08em; }
    .modal-name { font-size:1rem; font-weight:600; margin-bottom:20px; line-height:1.3; }
    .qty-input-row { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
    .qty-btn { width:52px; height:52px; background:var(--border); border:none; border-radius:4px; color:var(--text); font-size:1.4rem; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .qty-btn:active { background:var(--accent); color:var(--bg); }
    .qty-display { flex:1; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:2.5rem; font-weight:600; color:var(--accent); }
    .modal-btns { display:flex; gap:10px; }
    .btn-cancel { flex:1; background:var(--border); border:none; border-radius:4px; color:var(--muted); font-size:.9rem; padding:14px; cursor:pointer; }
    .btn-confirm { flex:2; background:var(--accent); border:none; border-radius:4px; color:var(--bg); font-size:.9rem; font-weight:700; padding:14px; cursor:pointer; font-family:'IBM Plex Mono',monospace; }

    /* ── Тост ── */
    #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--surface); border:1px solid var(--border); padding:12px 20px; border-radius:4px; font-family:'IBM Plex Mono',monospace; font-size:.8rem; transition:transform .3s; z-index:999; white-space:nowrap; }
    #toast.show { transform:translateX(-50%) translateY(0); }
    #toast.ok  { border-color:var(--ok); color:var(--ok); }
    #toast.err { border-color:var(--danger); color:var(--danger); }
  </style>
</head>
<body>

<header>
  <a href="/" class="back-btn">←</a>
  <h1>{{ order.order_number }}</h1>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="globalProgress" style="width:0%"></div>
  </div>
  <span class="progress-label" id="globalLabel">0%</span>
</header>

<div class="positions" id="positionsList">
  {% for pos in positions %}
  <div class="pos-card {% if pos.complete %}done{% endif %}" id="card-{{ pos.id }}" data-qty="{{ pos.qty }}" data-done="{{ pos.done }}">

    <div class="pos-top">
      <!-- Картинка -->
      <div class="pos-image">
        {% if pos.image_url %}
          <img src="{{ pos.image_url }}" alt="{{ pos.designation }}" loading="lazy">
        {% else %}
          <div class="no-img">нет<br>фото</div>
        {% endif %}
      </div>

      <!-- Инфо -->
      <div class="pos-body">
        <div class="pos-header">
          <span class="pos-num">{{ pos.pos_number or '—' }}</span>
          <span class="pos-name">{{ pos.name }}</span>
        </div>
        <div class="pos-designation">{{ pos.designation }}</div>
        <div class="pos-progress">
          <div class="pos-progress-bar">
            <div class="pos-progress-fill" id="fill-{{ pos.id }}"
                 style="width:{% if pos.qty > 0 %}{{ [pos.done / pos.qty * 100, 100]|min|int }}{% else %}0{% endif %}%"></div>
          </div>
          <span class="pos-qty-label" id="label-{{ pos.id }}">{{ pos.done|int }}/{{ pos.qty|int }} шт</span>
        </div>
      </div>
    </div>

    <!-- Кнопки -->
    <div class="pos-actions">
      {% if pos.complete %}
        <button class="btn-mark done-btn" disabled>✓ Готово</button>
      {% else %}
        <button class="btn-mark primary" onclick="markOne({{ pos.id }})">✓ +1 готово</button>
        <button class="btn-qty" onclick="openModal({{ pos.id }}, '{{ pos.name }}', {{ pos.qty }}, {{ pos.done }})">N шт</button>
      {% endif %}
    </div>

  </div>
  {% endfor %}
</div>

<!-- Модалка -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Отметить готовыми</h2>
    <div class="modal-name" id="modalName"></div>
    <div class="qty-input-row">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <div class="qty-display" id="qtyDisplay">1</div>
      <button class="qty-btn" onclick="changeQty(+1)">+</button>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-confirm" onclick="confirmModal()">ОТМЕТИТЬ</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  function updateGlobalProgress() {
    const cards = document.querySelectorAll('.pos-card');
    let total = 0, done = 0;
    cards.forEach(c => {
      const qty = parseFloat(c.dataset.qty) || 0;
      const d   = parseFloat(c.dataset.done) || 0;
      total += qty;
      done  += Math.min(d, qty);
    });
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    document.getElementById('globalProgress').style.width = pct + '%';
    document.getElementById('globalLabel').textContent = pct + '%';
  }

  function markOne(posId) { sendMark(posId, 1); }

  let activePos = null, modalQty = 1;

  function openModal(posId, name, planQty, doneQty) {
    activePos = posId;
    modalQty = Math.max(1, Math.round(planQty - doneQty));
    document.getElementById('modalName').textContent = name;
    document.getElementById('qtyDisplay').textContent = modalQty;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); activePos = null; }
  function changeQty(d) { modalQty = Math.max(1, modalQty + d); document.getElementById('qtyDisplay').textContent = modalQty; }
  function confirmModal() { if (!activePos) return; sendMark(activePos, modalQty); closeModal(); }

  document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

  function sendMark(posId, qty) {
    fetch(`/mark/${posId}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ qty_done: qty })
    })
    .then(r => r.json())
    .then(data => {
      if (data.ok) { updateCard(posId, data.total_done, data.qty, data.complete); showToast(`✓ +${qty} шт отмечено`, 'ok'); }
      else showToast(`✗ ${data.error}`, 'err');
    })
    .catch(() => showToast('✗ Ошибка сети', 'err'));
  }

  function updateCard(posId, done, qty, complete) {
    const card = document.getElementById(`card-${posId}`);
    if (!card) return;
    card.dataset.done = done;
    const pct = qty > 0 ? Math.min(Math.round(done / qty * 100), 100) : 0;
    document.getElementById(`fill-${posId}`).style.width = pct + '%';
    document.getElementById(`label-${posId}`).textContent = `${Math.round(done)}/${Math.round(qty)} шт`;
    if (complete) {
      card.classList.add('done');
      card.querySelector('.pos-actions').innerHTML = '<button class="btn-mark done-btn" disabled>✓ Готово</button>';
    }
    updateGlobalProgress();
  }

  function showToast(text, type='ok') {
    const t = document.getElementById('toast');
    t.textContent = text; t.className = `show ${type}`;
    setTimeout(() => t.className = '', 2500);
  }

  updateGlobalProgress();
</script>
</body>
</html>
